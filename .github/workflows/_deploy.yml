# ─────────────────────────────────────────────────────────────────────────────
# _deploy.yml — Reusable Deployment Workflow
#
# Called by release.yml via `uses: ./.github/workflows/_deploy.yml`.
# Handles deployment for any environment (staging, production).
#
# To configure a real deployment, set these secrets in the target environment
# (Repository Settings → Environments → <env name> → Environment secrets):
#
#   DEPLOY_HOST     — IP or hostname of the target server
#   DEPLOY_USER     — SSH user (e.g. ubuntu, deploy)
#   DEPLOY_SSH_KEY  — Private SSH key (the server must trust the public half)
#   GHCR_TOKEN      — GitHub PAT with read:packages scope for docker pull
#
# If DEPLOY_HOST is not set the job runs in mock mode — it prints what it
# would have done without connecting to any server. This lets the pipeline
# succeed end-to-end even before infrastructure is provisioned.
#
# Production environments should also configure APP_URL as an environment
# variable so the smoke-test knows which URL to probe.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment name (staging | production)
        required: true
        type: string
      image_tag:
        description: Immutable Docker image tag to deploy (e.g. sha-abc1234)
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/appointments-backend
  IMAGE_FRONTEND: ${{ github.repository }}/appointments-frontend

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest

    # Environment provides the manual-approval gate for production and
    # surfaces the deployment URL in the GitHub UI.
    environment:
      name: ${{ inputs.environment }}
      url: ${{ vars.APP_URL }}

    steps:
      # ── Pre-flight: check whether deployment secrets are configured ──────
      - name: Check deployment configuration
        id: config
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No DEPLOY_HOST secret found for environment \
          '${{ inputs.environment }}'. Running in mock mode. \
          See .github/workflows/_deploy.yml for setup instructions."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Real deployment (SSH into server, pull image, restart compose) ───
      - name: Deploy via SSH
        if: steps.config.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY,REPO
          # Strict mode: any command failure aborts the deploy immediately
          script: |
            set -euo pipefail

            cd /opt/appointment-booking-system

            # Authenticate against GHCR using a scoped PAT (not GITHUB_TOKEN,
            # which is ephemeral and unavailable outside the Actions runner)
            echo "${{ secrets.GHCR_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull the exact, immutable image produced by this release
            docker pull "${REGISTRY}/${REPO}/appointments-backend:${IMAGE_TAG}"
            docker pull "${REGISTRY}/${REPO}/appointments-frontend:${IMAGE_TAG}"

            # Tag as the environment name so compose picks them up without
            # needing to edit docker-compose.yml on the server
            docker tag \
              "${REGISTRY}/${REPO}/appointments-backend:${IMAGE_TAG}" \
              "${REGISTRY}/${REPO}/appointments-backend:${DEPLOY_ENV}"
            docker tag \
              "${REGISTRY}/${REPO}/appointments-frontend:${IMAGE_TAG}" \
              "${REGISTRY}/${REPO}/appointments-frontend:${DEPLOY_ENV}"

            # Rolling update — zero-downtime restart
            docker compose up -d --no-build --remove-orphans

            # Remove dangling images to reclaim disk space
            docker image prune -f

      # ── Mock deployment (no SSH secrets configured) ──────────────────────
      - name: Mock deploy
        if: steps.config.outputs.ready == 'false'
        run: |
          echo "═══════════════════════════════════════════"
          echo " MOCK DEPLOY — infrastructure not yet set up"
          echo "═══════════════════════════════════════════"
          echo "  Environment : ${{ inputs.environment }}"
          echo "  Image tag   : ${{ inputs.image_tag }}"
          echo ""
          echo "  Would execute on server:"
          echo "  $ docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ inputs.image_tag }}"
          echo "  $ docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ inputs.image_tag }}"
          echo "  $ docker compose up -d --no-build --remove-orphans"
          echo "═══════════════════════════════════════════"

      # ── Smoke test — verify the app is responding after deploy ───────────
      - name: Smoke test
        if: steps.config.outputs.ready == 'true' && vars.APP_URL != ''
        run: |
          echo "Waiting 20s for services to stabilise..."
          sleep 20

          STATUS=$(curl --silent --output /dev/null \
                        --write-out "%{http_code}" \
                        --max-time 10 \
                        "${{ vars.APP_URL }}/api/health")

          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed — /api/health returned HTTP ${STATUS}"
            exit 1
          fi

          echo "Smoke test passed — HTTP ${STATUS}"
