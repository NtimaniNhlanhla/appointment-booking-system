name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint · Test · Build · Docker
    runs-on: ubuntu-latest

    # PostgreSQL service required for backend integration tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: appointments_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      # 4. Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # 4a. Generate Prisma client (must run before any tsc invocation)
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # 5. Lint frontend
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      # 6. Lint backend
      - name: Lint backend
        working-directory: backend
        run: npm run lint

      # 7. Test frontend
      - name: Test frontend
        working-directory: frontend
        run: npm test

      # 8. Test backend (requires Prisma setup + postgres service)
      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/appointments_test
        run: npx prisma migrate deploy

      - name: Test backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/appointments_test
          NODE_ENV: test
          PORT: 5001
          FRONTEND_URL: http://localhost:5173
        run: npm test

      # 9. Build frontend
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      # 10. Build backend
      - name: Build backend
        working-directory: backend
        run: npm run build

      # 11. Build Docker images
      - name: Build frontend Docker image
        run: docker build -t appointment-frontend ./frontend

      - name: Build backend Docker image
        run: docker build -t appointment-backend ./backend
